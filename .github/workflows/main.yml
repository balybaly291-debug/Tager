name: Build APK
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp Index.html www/index.html

      - run: npm install

      - name: Install Capacitor Assets Tool
        run: npm install -g @capacitor/assets

      - run: npx cap add android

      - name: Generate Icons using Capacitor Assets
        run: |
          mkdir -p assets
          cp icon.png assets/icon.png
          npx capacitor-assets generate --iconBackgroundColor '#ffffff' --iconBackgroundColorDark '#ffffff' --splashBackgroundColor '#ffffff' --splashBackgroundColorDark '#111111'

      - run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: tajir-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
