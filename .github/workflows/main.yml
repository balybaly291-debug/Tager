name: Build APK
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp Index.html www/index.html

      - run: npm install
      - run: npx cap add android
      - run: npx cap sync android

      - name: Override Icons
        run: |
          sudo apt-get install -y imagemagick
          for size in 48 72 96 144 192; do
            case $size in
              48)  folder="mipmap-mdpi" ;;
              72)  folder="mipmap-hdpi" ;;
              96)  folder="mipmap-xhdpi" ;;
              144) folder="mipmap-xxhdpi" ;;
              192) folder="mipmap-xxxhdpi" ;;
            esac
            mkdir -p android/app/src/main/res/$folder
            convert icon.png -resize ${size}x${size} android/app/src/main/res/$folder/ic_launcher.png
            convert icon.png -resize ${size}x${size} android/app/src/main/res/$folder/ic_launcher_round.png
          done
          rm -rf android/app/src/main/res/mipmap-anydpi-v26

      - name: Add Permissions to AndroidManifest
        run: |
          cat > /tmp/manifest_patch.py << 'PYEOF'
          with open('android/app/src/main/AndroidManifest.xml', 'r') as f:
              content = f.read()

          permissions = """
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
              <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
              <uses-permission android:name="android.permission.WAKE_LOCK"/>
              <uses-permission android:name="android.permission.REQUEST_IGNORE_BATTERY_OPTIMIZATIONS"/>
          """

          if 'ACCESS_FINE_LOCATION' not in content:
              content = content.replace('<application', permissions + '\n    <application', 1)

          if 'usesCleartextTraffic' not in content:
              content = content.replace(
                  'android:label=',
                  'android:usesCleartextTraffic="true" android:label='
              )

          with open('android/app/src/main/AndroidManifest.xml', 'w') as f:
              f.write(content)

          print("✅ AndroidManifest updated")
          PYEOF
          python3 /tmp/manifest_patch.py

      - name: Register Service in AndroidManifest
        run: |
          cat > /tmp/services_patch.py << 'PYEOF'
          with open('android/app/src/main/AndroidManifest.xml', 'r') as f:
              content = f.read()

          services = """
              <service
                  android:name=".BackgroundService"
                  android:enabled="true"
                  android:exported="false"
                  android:foregroundServiceType="location"/>
          """

          if 'BackgroundService' not in content:
              content = content.replace('</application>', services + '\n    </application>')

          with open('android/app/src/main/AndroidManifest.xml', 'w') as f:
              f.write(content)

          print("✅ Services registered")
          PYEOF
          python3 /tmp/services_patch.py

      - name: Create Background Service
        run: |
          mkdir -p android/app/src/main/java/com/tajir/app
          cat > android/app/src/main/java/com/tajir/app/BackgroundService.java << 'EOF'
          package com.tajir.app;

          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.app.Service;
          import android.content.Intent;
          import android.os.Build;
          import android.os.IBinder;
          import androidx.core.app.NotificationCompat;

          public class BackgroundService extends Service {
              private static final String CHANNEL_ID = "TajirChannel";
              private static final int NOTIFICATION_ID = 1;

              @Override
              public void onCreate() {
                  super.onCreate();
                  createNotificationChannel();
                  startForeground(NOTIFICATION_ID, buildNotification());
              }

              private Notification buildNotification() {
                  Intent intent = new Intent(this, MainActivity.class);
                  PendingIntent pendingIntent = PendingIntent.getActivity(
                      this, 0, intent,
                      PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE
                  );
                  return new NotificationCompat.Builder(this, CHANNEL_ID)
                      .setContentTitle("تطبيق التاجر")
                      .setContentText("التطبيق يعمل في الخلفية")
                      .setSmallIcon(R.mipmap.ic_launcher)
                      .setContentIntent(pendingIntent)
                      .setOngoing(true)
                      .build();
              }

              private void createNotificationChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel channel = new NotificationChannel(
                          CHANNEL_ID, "تطبيق التاجر", NotificationManager.IMPORTANCE_LOW
                      );
                      NotificationManager manager = getSystemService(NotificationManager.class);
                      if (manager != null) manager.createNotificationChannel(channel);
                  }
              }

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  return START_STICKY;
              }

              @Override
              public IBinder onBind(Intent intent) { return null; }
          }
          EOF

      - name: Create MainActivity
        run: |
          MAIN=$(find android -name "MainActivity.java" | head -1)
          cat > $MAIN << 'EOF'
          package com.tajir.app;

          import android.content.Intent;
          import android.os.Build;
          import android.os.Bundle;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  Intent serviceIntent = new Intent(this, BackgroundService.class);
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      startForegroundService(serviceIntent);
                  } else {
                      startService(serviceIntent);
                  }
              }
          }
          EOF

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: tajir-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
